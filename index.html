<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 자율 자가진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f5f9;
        }
        
        .item-badge {
            display: inline-flex;
            align-items: center;
        }
        
        /* Print Styles */
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm z-20 no-print relative">
        <!-- Logo Area -->
        <div class="h-16 flex items-center px-6 border-b border-slate-100 bg-gradient-to-r from-indigo-600 to-blue-700 text-white">
            <i class="fa-solid fa-clipboard-check text-xl mr-3 opacity-90"></i>
            <h1 class="text-lg font-bold tracking-tight">자가진단 시스템</h1>
        </div>
        
        <!-- Period & Sector Toggles -->
        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
            <div class="flex bg-slate-200 p-1 rounded-lg mb-3">
                <button id="btnPeriodFirst" onclick="setPeriod('first')" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-indigo-700 shadow-sm transition-all">상반기</button>
                <button id="btnPeriodSecond" onclick="setPeriod('second')" class="flex-1 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-700 transition-all">하반기</button>
            </div>
            <div class="flex bg-slate-200 p-1 rounded-lg">
                <button id="btnAcademic" onclick="setSector('academic')" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-indigo-700 shadow-sm transition-all">학사분야</button>
                <button id="btnFinance" onclick="setSector('finance')" class="flex-1 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-700 transition-all">회계분야</button>
            </div>
        </div>
        
        <!-- Search -->
        <div class="px-4 py-3 border-b border-slate-100">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="searchTerm" placeholder="카테고리 검색..." class="w-full bg-slate-100 border-none rounded-lg pl-8 pr-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 transition-all outline-none" onkeyup="renderCategoryMenu()">
            </div>
        </div>
        
        <!-- Category Menu -->
        <div class="flex-1 overflow-y-auto p-3" id="categoryContainer">
            <!-- Categories will be injected here -->
        </div>
        
        <div class="p-3 bg-slate-50 border-t border-slate-200 text-xs text-slate-500 font-medium flex justify-between">
            <span>총 카테고리</span>
            <span id="catTotal" class="font-bold text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded-full">0</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10 no-print shadow-sm">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">학교명</span>
                    <input type="text" id="schoolName" class="border-b border-slate-300 focus:border-indigo-600 outline-none text-sm font-bold text-slate-800 w-32 pb-0.5 bg-transparent transition-colors" placeholder="학교명 입력">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">점검자</span>
                    <input type="text" id="inspectorName" class="border-b border-slate-300 focus:border-indigo-600 outline-none text-sm font-bold text-slate-800 w-24 pb-0.5 bg-transparent transition-colors" placeholder="이름 입력">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">점검일자</span>
                    <input type="date" id="inspectionDate" class="border-b border-slate-300 focus:border-indigo-600 outline-none text-sm font-bold text-slate-800 w-36 pb-0.5 bg-transparent transition-colors cursor-pointer">
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="syncIndicator" class="text-xs font-medium text-slate-400 flex items-center gap-1.5 px-3 py-1 bg-slate-100 rounded-full">
                    <i class="fa-solid fa-cloud"></i> 저장됨
                </div>
                <button id="btnRestoreCache" onclick="restoreFromCache()" class="text-xs font-bold bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg hover:bg-amber-200 transition-colors hidden">
                    <i class="fa-solid fa-clock-rotate-left mr-1"></i> 임시저장 복구
                </button>
                <button onclick="printReport()" class="text-xs font-bold bg-white border border-slate-300 text-slate-700 px-4 py-1.5 rounded-lg hover:bg-slate-50 hover:text-indigo-600 transition-colors shadow-sm">
                    <i class="fa-solid fa-print mr-1"></i> 출력
                </button>
                <button onclick="downloadHWPX()" class="text-xs font-bold bg-indigo-600 text-white px-4 py-1.5 rounded-lg hover:bg-indigo-700 shadow-md transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-file-word"></i> HWPX 다운로드
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="flex-1 overflow-y-auto p-8 relative no-print">
            <!-- Dashboard Widget -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex justify-between items-center bg-gradient-to-br from-white to-slate-50">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-3">
                        <span id="activeCatId" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-lg font-black tracking-tight border border-indigo-200 shadow-sm"></span>
                        <span id="activeCatTitle"></span>
                    </h2>
                    <p id="catProgressText" class="text-slate-500 text-sm mt-2 font-medium flex items-center gap-2">
                        <i class="fa-solid fa-chart-pie text-slate-400"></i> 진행 현황 로딩중...
                    </p>
                </div>
                
                <div class="flex items-center gap-8">
                    <!-- Stats Blocks -->
                    <div class="flex gap-4">
                        <div class="text-center px-4 border-r border-slate-200">
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">이행</div>
                            <div id="cntOk" class="text-xl font-black text-emerald-600">0</div>
                        </div>
                        <div class="text-center px-4 border-r border-slate-200">
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">미흡</div>
                            <div id="cntWarning" class="text-xl font-black text-amber-500">0</div>
                        </div>
                        <div class="text-center px-4">
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">미이행</div>
                            <div id="cntAlert" class="text-xl font-black text-rose-500">0</div>
                        </div>
                    </div>
                    
                    <!-- Progress Circle -->
                    <div class="relative w-16 h-16 flex items-center justify-center">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path class="text-slate-100" stroke-width="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="progCircle" class="text-indigo-600 transition-all duration-1000 ease-out" stroke-width="4" stroke-dasharray="0, 100" stroke="currentColor" fill="none" stroke-linecap="round" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="progRate" class="text-sm font-black text-slate-800 leading-none">0%</span>
                            <span id="progRatio" class="text-[9px] font-bold text-slate-400 mt-0.5">0/0</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 text-sm font-semibold text-slate-600">
                    <i class="fa-solid fa-list-check text-indigo-500"></i> 점검 문항
                </div>
                <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer hover:text-indigo-600 transition-colors bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                    <input type="checkbox" id="chkOnlyWarning" class="rounded text-indigo-600 focus:ring-indigo-500" onchange="loadActiveCategoryItems()">
                    미흡/미이행 문항만 보기
                </label>
            </div>

            <!-- Table -->
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase w-12 text-center">No</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase">점검 내용</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase w-48 text-center">결과 판정</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase w-72">미흡내용 및 조치계획</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase w-20 text-center">적용대상</th>
                        </tr>
                    </thead>
                    <tbody id="checklistTableBody" class="divide-y divide-slate-100">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- HWPX Loading Overlay -->
    <div id="hwpxLoading" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4 border border-slate-100">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <h3 class="text-lg font-bold text-slate-800 mb-1">HWPX 생성 중...</h3>
            <p class="text-sm text-slate-500 text-center font-medium">데이터를 분석하여 보고서를 구성하고 있습니다.<br>잠시만 기다려주세요.</p>
        </div>
    </div>

    <!-- Print Container (Hidden) -->
    <div class="hidden print-only p-8 max-w-5xl mx-auto bg-white">
        <div class="text-center mb-8 border-b-2 border-slate-800 pb-4">
            <h1 class="text-3xl font-black text-slate-900 mb-2">자가진단 체크리스트 결과 보고서</h1>
            <p class="text-lg font-bold text-slate-600" id="printSchoolName"></p>
        </div>
        <div id="printTableContainer"></div>
    </div>

    <!-- DB & Logic -->
    <script>
        const checklistDatabase = {
            academic: {
                title: "학사분야 자가진단",
                categories: [
                    {
                        id: "1-1",
                        title: "유치원 각종 규정",
                        items: [
                            { no: "1", content: "유치원생활기록부 기록 및 관리의 적정성 여부", scope: "유" },
                            { no: "2", content: "졸업과 수료 규칙에 따른 생활기록부 적정 처리 여부", scope: "유" },
                            { no: "3", content: "유치원생활기록부 조항별 기재요령 준수 여부", scope: "유" },
                            { no: "4", content: "유치원규칙의 제정 및 관리 준수 여부", scope: "유" },
                            { no: "5", content: "유치원운영위원회 심의사항 준수 여부", scope: "유" },
                            { no: "6", content: "무단결석자 처리와 퇴학 유아 관리의 적정 여부", scope: "유" },
                            { no: "7", content: "법정 장부 및 비치장부 관리의 적정 여부", scope: "유" },
                            { no: "8", content: "건강검진실시 및 결과처리의 적정 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "1-2",
                        title: "유치원 교육과정",
                        items: [
                            { no: "1", content: "유아교육계획 수립의 적정성", scope: "유" },
                            { no: "2", content: "교육과정 운영 시간 준수 여부", scope: "유" },
                            { no: "3", content: "놀이시간 확보 여부", scope: "유" },
                            { no: "4", content: "교육과정 중 특성화활동 금지 준수 여부", scope: "유" },
                            { no: "5", content: "연간 법정의무(인성, 안전 등) 연수 관련 이수 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "1-3",
                        title: "유치원 방과후 과정(일반 운영)",
                        items: [
                            { no: "1", content: "유치원 방과후 과정 계획 수립의 적정 여부", scope: "유" },
                            { no: "2", content: "유치원 방과후 과정 운영 시간 준수 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "1-4",
                        title: "유치원 방과후 특성화활동",
                        items: [
                            { no: "1", content: "특성화활동 운영 계획의 적정성", scope: "유" },
                            { no: "2", content: "유아 1인당 1일 1개 1시간 이내 준수 여부", scope: "유" },
                            { no: "3", content: "특성화 프로그램 선정 절차 준수 여부", scope: "유" },
                            { no: "4", content: "강사 채용 시 필요 서류 구비 및 절차 준수 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "1-5",
                        title: "돌봄유치원",
                        items: [
                            { no: "1", content: "돌봄 운영 내용 준수 여부", scope: "유" },
                            { no: "2", content: "저녁돌봄 운영 준수내용 적정성", scope: "유" },
                            { no: "3", content: "돌봄 인력 채용과정 준수 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "1-6",
                        title: "유치원 안전교육",
                        items: [
                            { no: "1", content: "안전계획(안전 관리 포함) 수립 적정성", scope: "유" },
                            { no: "2", content: "유치원 교원 및 학부모 안전교육 이행 여부", scope: "유" },
                            { no: "3", content: "안전교육 7대 영역별 교육 실시 여부", scope: "유" },
                            { no: "4", content: "안전관리 매뉴얼 비치 활용 여부", scope: "유" }
                        ]
                    },
                    {
                        id: "2-1-1",
                        title: "초등 학교규칙 및 각종 규정",
                        items: [
                            { no: "1", content: "학교규칙 제·개정 적정 여부 (제‧개정 위원회 구성, 학생·학부모·교원 의견수렴, 학교운영위원회 심의)", scope: "초" },
                            { no: "2", content: "학생포상·징계규정과 학생생활규정 등 학교규칙의 상위법규(지침)에 따른 제·개정의 적법성 여부", scope: "초" },
                            { no: "3", content: "학업성적관리위원회 규정 제·개정 및 운영의 적정 여부", scope: "초" },
                            { no: "4", content: "학생 포상 규정 준수 여부", scope: "초" }
                        ]
                    },
                    {
                        id: "2-2-1",
                        title: "초등 출결관리",
                        items: [
                            { no: "1", content: "전출일과 전입일이 동일할 경우 전입일만 수업일수로 산정", scope: "초" },
                            { no: "2", content: "병원학교 수업참여 또는 화상강의 이수는 출석으로 인정", scope: "초" },

                            { no: "4", content: "'특기사항' 란에는 장기결석, 기타 결석의 사유 등을 입력과 입력 불가한 내용의 입력 여부", scope: "초" },
                            { no: "5", content: "'특기사항' 란에는 1회의 결석·지각·조퇴·결과도 없는 경우 '개근' 입력", scope: "초" },
                            { no: "6", content: "조업 또는 진급을 위한 출석일수 부족학생은 유급처리", scope: "초" },
                            { no: "7", content: "장기 결석자에 대한 출석 독려 조치 시행", scope: "초" },
                            { no: "8", content: "천재지변, 법정전염병 등으로 출석하지 못한 경우 출석으로 처리함", scope: "초" }
                        ]
                    },
                    {
                        id: "2-3-1",
                        title: "초등 학적관리",
                        items: [
                            { no: "1", content: "입학·재취학 시 교육과정 이수에 지장이 없는 범위에 대한 기준 준수 여부", scope: "초" },
                            { no: "2", content: "전출·입 시 수업일수 인정의 적정성", scope: "초" },
                            { no: "3", content: "의무교육대상자의 유예, 면제 처리 적정성", scope: "초" },
                            { no: "4", content: "유예자 학적 관리(정원 외 관리자) 및 재취학 절차의 적절성", scope: "초" },
                            { no: "5", content: "미인정 유학자에 대한 학적처리 적정 여부", scope: "초" }
                        ]
                    },
                    {
                        id: "2-5-1",
                        title: "초등 학교생활기록부",
                        items: [
                            { no: "1", content: "교외상 학교생활기록부 미 입력 지침 준수 여부", scope: "초" },

                            { no: "1", content: "학교급식운영 계획의 매 학년도 시작 전(2월말)까지 학교운영위원회 심의 여부", scope: "각급학교" },
                            { no: "2", content: "학교급식소위원회 구성 및 운영 적정성, 우유급식 실시 관련 학운위 심의 여부", scope: "각급학교" },
                            { no: "3", content: "급식비 예산의 목적외 사용 금지 준수 여부 및 학교급식 정보 공개 여부", scope: "각급학교" },
                            { no: "4", content: "급식소 방역 소독 및 급식 위생 관리 (일일 위생·안전점검표 작성, 세척제 잔류 확인 기록유지)", scope: "각급학교" },
                            { no: "5", content: "식재료 구매 시 계약관계 법령 준수 (특정제품 단수 지정 금지, 적격업체 이용 등)", scope: "각급학교" },
                            { no: "6", content: "식재료 발주 시 원산지, 등급 등 품질기준 명시 및 복수자 검수 이행 여부", scope: "각급학교" },
                            { no: "7", content: "학교급식 식재료 품질 확인서 위·변조 및 대체 납품 확인 (축산물 등급, 친환경 인증)", scope: "각급학교" },
                            { no: "8", content: "한우 사용 학교 유전자 검사 실시 여부", scope: "각급학교" }
                        ]
                    }
                ]
            }
        }
        };
        
// 2. 현재 앱 상태 관리
        let currentPeriod = 'first';
        let currentSector = 'academic';
        let currentCategoryIndex = 0;

        // 개별 이력정보(점검자, 날짜)까지 담는 사용자 진단 오브젝트 (상/하반기 분리)
        let userProgress = {
            first: { academic: {}, finance: {} },
            second: { academic: {}, finance: {} }
        };

        // DOM 참조
        const elSchoolName = document.getElementById('schoolName');
        const elInspectorName = document.getElementById('inspectorName');
        const elInspectionDate = document.getElementById('inspectionDate');

        // 초기 실행
        window.onload = function () {
            const today = new Date().toISOString().split('T')[0];
            elInspectionDate.value = today;

            initProgressStructure();
            renderCategoryMenu();
            loadActiveCategoryItems();
            updateDashboardStats();

            // 서버로부터 기존 체크리스트 데이터 전송 받아 복구
            loadExistingDataFromServer();
            
            // 로컬 캐시 존재 여부 확인
            checkLocalCache();

            elSchoolName.addEventListener('input', () => { updateDashboardStats(); });
            elInspectorName.addEventListener('input', () => { updateDashboardStats(); saveLocalCache(); });
            elInspectionDate.addEventListener('change', () => { updateDashboardStats(); saveLocalCache(); });
        };

        function initProgressStructure() {
            ['first', 'second'].forEach(period => {
                ['academic', 'finance'].forEach(sect => {
                    checklistDatabase[sect].categories.forEach(cat => {
                        userProgress[period][sect][cat.id] = {};
                        cat.items.forEach(item => {
                            userProgress[period][sect][cat.id][item.no] = {
                                result: '',      // '', 'O', 'S', 'X'
                                action: '',      // 미흡내용/조치계획
                                inspector: '',   // 항목별 점검자명
                                date: ''         // 항목별 점검일자
                            };
                        });
                    });
                });
            });
        }

        /**
         * 로컬 스토리지에 현재 상태 자동 저장 (오프라인/에러 대비)
         */
        function saveLocalCache() {
            const cacheData = {
                progress: userProgress,
                inspector: elInspectorName.value,
                date: elInspectionDate.value,
                timestamp: new Date().getTime()
            };
            localStorage.setItem('checklistCache', JSON.stringify(cacheData));
        }

        function checkLocalCache() {
            const cache = localStorage.getItem('checklistCache');
            if (cache) {
                try {
                    const parsed = JSON.parse(cache);
                    const btn = document.getElementById('btnRestoreCache');
                    if (btn) {
                        btn.style.display = 'flex';
                        const timeStr = new Date(parsed.timestamp).toLocaleString();
                        btn.title = `${timeStr} 에 임시저장된 데이터가 있습니다.`;
                    }
                } catch(e) {}
            }
        }

        function restoreLocalCache() {
            if(!confirm("브라우저에 임시저장된 마지막 작업 상태를 불러오시겠습니까?\\n(저장되지 않고 날아간 데이터를 복구합니다)")) return;
            
            const cache = localStorage.getItem('checklistCache');
            if(cache) {
                try {
                    const parsed = JSON.parse(cache);
                    if(parsed.progress) {
                        // 기존 상태 병합
                        Object.keys(parsed.progress).forEach(key1 => {
                            if (key1 === 'first' || key1 === 'second') {
                                // 신규 버전 캐시 (period 존재)
                                const period = key1;
                                Object.keys(parsed.progress[period]).forEach(sect => {
                                    if (userProgress[period][sect]) {
                                        Object.keys(parsed.progress[period][sect]).forEach(cat => {
                                            if (userProgress[period][sect][cat]) {
                                                Object.keys(parsed.progress[period][sect][cat]).forEach(item => {
                                                    const cachedItem = parsed.progress[period][sect][cat][item];
                                                    if (cachedItem && cachedItem.result) {
                                                        userProgress[period][sect][cat][item] = cachedItem;
                                                    }
                                                });
                                            }
                                        });
                                    }
                                });
                            } else {
                                // 구버전 캐시 (바로 academic, finance가 오는 경우)
                                const sect = key1;
                                if (userProgress['first'][sect]) {
                                    Object.keys(parsed.progress[sect]).forEach(cat => {
                                        if (userProgress['first'][sect][cat]) {
                                            Object.keys(parsed.progress[sect][cat]).forEach(item => {
                                                const cachedItem = parsed.progress[sect][cat][item];
                                                if (cachedItem && cachedItem.result) {
                                                    userProgress['first'][sect][cat][item] = cachedItem;
                                                }
                                            });
                                        }
                                    });
                                }
                            }
                        });
                    }
                    if(parsed.inspector) elInspectorName.value = parsed.inspector;
                    if(parsed.date) elInspectionDate.value = parsed.date;
                    
                    loadActiveCategoryItems();
                    renderCategoryMenu();
                    updateDashboardStats();
                    alert("임시저장된 데이터가 성공적으로 복구되었습니다.\\n(서버에 확실히 반영하려면 항목 하나를 변경해주세요)");
                } catch(e) {
                    alert("캐시를 불러오는 중 오류가 발생했습니다.");
                }
            }
        }

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrad8viJgIYDMBZgbZd97qsykjM0aamKHH4GiFWWQ4324R7-aZW4k3taGiYAY-GkoH-Q/exec';

        /**
         * 페이지 로드 시 구글 시트로부터 실시간 데이터 전체 로드 및 초기화
         */
        function loadExistingDataFromServer() {
            setSyncStatus('loading', '시트에서 데이터를 읽어오는 중...');
            
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(response => {
                    if (response.success && response.data) {
                        response.data.forEach(row => {
                            if (!row.key) return;
                            const parts = row.key.split('_');
                            if (parts.length < 4) return;
                            
                            const p = parts[0];
                            const s = parts[1];
                            const actualCatId = parts[2];
                            const actualItemNo = parts.slice(3).join('_');
                            
                            if (userProgress[p] && 
                                userProgress[p][s] && 
                                userProgress[p][s][actualCatId] && 
                                userProgress[p][s][actualCatId][actualItemNo]) {
                                
                                userProgress[p][s][actualCatId][actualItemNo] = {
                                    result: row.result,
                                    action: row.action,
                                    inspector: row.inspector,
                                    date: row.date
                                };
                            }
                        });
                        loadActiveCategoryItems();
                        renderCategoryMenu();
                        updateDashboardStats();
                        setSyncStatus('ready', '시트 연동 및 로드 완료');
                    } else {
                        setSyncStatus('ready', '서버 데이터가 비어있음 (새 시트)');
                    }
                })
                .catch(err => {
                    setSyncStatus('error', '데이터 연동 오류: ' + err.toString());
                });
        }

        /**
         * 상태등 배지 변경 유틸
         */
        function setSyncStatus(status, text) {
            const el = document.getElementById('syncIndicator');
            if (!el) return;

            let icon = '';
            let colorClass = '';

            switch (status) {
                case 'loading':
                    icon = '<i class="fa-solid fa-rotate animate-spin text-[10px]"></i>';
                    colorClass = 'bg-blue-100 text-blue-800';
                    break;
                case 'saving':
                    icon = '<i class="fa-solid fa-cloud-arrow-up animate-bounce text-[10px]"></i>';
                    colorClass = 'bg-amber-100 text-amber-800';
                    break;
                case 'ready':
                    icon = '<i class="fa-solid fa-cloud-check text-green-600 text-[10px]"></i>';
                    colorClass = 'bg-green-100 text-green-800';
                    break;
                case 'error':
                    icon = '<i class="fa-solid fa-triangle-exclamation text-red-600 text-[10px]"></i>';
                    colorClass = 'bg-red-100 text-red-800';
                    break;
                case 'offline':
                    icon = '<i class="fa-solid fa-plug-circle-xmark text-slate-500 text-[10px]"></i>';
                    colorClass = 'bg-slate-100 text-slate-700';
                    break;
            }

            el.className = `inline-flex items-center gap-1.5 font-bold px-2.5 py-1 rounded-md ${colorClass} transition-all duration-200`;
            el.innerHTML = `${icon} ${text}`;
        }

        // 상/하반기 전환 탭 제어
        function switchPeriod(period) {
            currentPeriod = period;
            
            const btn1 = document.getElementById('btnPeriodFirst');
            const btn2 = document.getElementById('btnPeriodSecond');
            
            if (period === 'first') {
                btn1.className = "px-4 py-2 rounded-md font-semibold text-sm transition-all duration-200 bg-white text-indigo-900 shadow";
                btn2.className = "px-4 py-2 rounded-md font-semibold text-sm transition-all duration-200 text-slate-600 hover:text-slate-900";
            } else {
                btn2.className = "px-4 py-2 rounded-md font-semibold text-sm transition-all duration-200 bg-white text-indigo-900 shadow";
                btn1.className = "px-4 py-2 rounded-md font-semibold text-sm transition-all duration-200 text-slate-600 hover:text-slate-900";
            }
            
            renderCategoryMenu();
            loadActiveCategoryItems();
            updateDashboardStats();
        }

        // 3. 분야 전환 탭 제어
        function switchSector(sector) {
            currentSector = sector;
            currentCategoryIndex = 0;

            const btnA = document.getElementById('btnAcademic');
            const btnF = document.getElementById('btnFinance');

            if (sector === 'academic') {
                btnA.className = "px-5 py-2 rounded-md font-semibold text-sm transition-all duration-200 bg-white text-blue-900 shadow";
                btnF.className = "px-5 py-2 rounded-md font-semibold text-sm transition-all duration-200 text-slate-600 hover:text-slate-900";
            } else {
                btnF.className = "px-5 py-2 rounded-md font-semibold text-sm transition-all duration-200 bg-white text-blue-900 shadow";
                btnA.className = "px-5 py-2 rounded-md font-semibold text-sm transition-all duration-200 text-slate-600 hover:text-slate-900";
            }

            renderCategoryMenu();
            loadActiveCategoryItems();
            updateDashboardStats();
        }

        // 4. 왼쪽 메뉴 카테고리 렌더링
        function getMajorTitle(sector, prefix) {
            if (sector === 'academic') {
                const map = {
                    '1': '유치원 학사관리',
                    '2': '초ㆍ중등 학사관리',
                    '3': '교육과정·평가',
                    '4': '방과후학교',
                    '5': '학생생활교육',
                    '6': '현장체험학습ㆍ학생봉사활동',
                    '7': '장학금',
                    '8': '영어교육',
                    '9': '과학교육',
                    '10': '체육·보건 교육',
                    '11': '도서관 관리·독서교육',
                    '12': '특수교육',
                    '14': '교원인사관리',
                    '15': '정보 업무'
                };
                return map[prefix] || '학사관리';
            } else {
                const map = {
                    '1': '일반 행정',
                    '2': '공무원 행동강령 및 청렴',
                    '3': '계약',
                    '4': '안전ㆍ재난',
                    '5': '인사관리 및 복무',
                    '6': '공유재산 및 물품 관리',
                    '7': '예산·회계 관리',
                    '8': '학교급식'
                };
                return map[prefix] || '회계관리';
            }
        }

        function renderCategoryMenu() {
            const container = document.getElementById('categoryContainer');
            if (!container) return;
            container.innerHTML = '';

            const cats = checklistDatabase[currentSector].categories;
            const totalEl = document.getElementById('catTotal');
            if(totalEl) totalEl.innerText = `${cats.length}개 분야`;

            cats.forEach((cat, idx) => {
                const prefix = cat.id.split('-')[0];
                const isFirstOfMajor = idx === 0 || cats[idx-1].id.split('-')[0] !== prefix;
                
                if (isFirstOfMajor) {
                    const majorTitle = getMajorTitle(currentSector, prefix);
                    const headerHtml = `
                        <div class="mt-5 mb-2 text-[14px] font-extrabold text-slate-800 border-b-2 border-slate-300 pb-1 flex items-center gap-1.5 px-1">
                            <span class="bg-indigo-600 text-white text-[11px] px-2 py-0.5 rounded-md shadow-sm">${prefix}</span>
                            <span>${majorTitle}</span>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', headerHtml);
                }

                const items = cat.items;
                let checkedCount = 0;
                items.forEach(it => {
                    if (userProgress[currentPeriod] && 
                        userProgress[currentPeriod][currentSector] && 
                        userProgress[currentPeriod][currentSector][cat.id] && 
                        userProgress[currentPeriod][currentSector][cat.id][it.no]) {
                        const state = userProgress[currentPeriod][currentSector][cat.id][it.no];
                        if (state.result && state.result !== '') checkedCount++;
                    }
                });

                const activeClass = idx === currentCategoryIndex
                    ? "bg-blue-50 border-l-4 border-blue-600 text-blue-900 font-bold"
                    : "hover:bg-slate-50 text-slate-600";

                const itemHtml = `
          <button onclick="selectCategory(${idx})" class="w-full text-left p-2.5 rounded-lg transition-all flex items-center justify-between text-xs ${activeClass} mb-1">
            <div class="flex flex-col gap-1 pr-2">
              <span class="text-[10px] text-slate-400 font-mono">구분 ${cat.id}</span>
              <span class="truncate max-w-[190px]">${cat.title}</span>
            </div>
            <span class="text-[10px] bg-white border border-slate-200 px-1.5 py-0.5 rounded text-slate-500 font-mono shadow-sm">
              ${checkedCount}/${items.length}
            </span>
          </button>
        `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function selectCategory(index) {
            currentCategoryIndex = index;
            renderCategoryMenu();
            loadActiveCategoryItems();
        }

        // 5. 우측 테이블 문항 생성
        function loadActiveCategoryItems() {
            const cats = checklistDatabase[currentSector].categories;
            const activeCat = cats[currentCategoryIndex];

            document.getElementById('activeCatId').innerText = activeCat.id;
            document.getElementById('activeCatTitle').innerText = activeCat.title;

            const tbody = document.getElementById('checklistTableBody');
            tbody.innerHTML = '';

            activeCat.items.forEach(item => {
                const state = userProgress[currentPeriod][currentSector][activeCat.id][item.no];
                const result = state ? state.result : '';
                const action = state ? state.action : '';
                const inspector = state ? state.inspector : '';
                const date = state ? state.date : '';

                // 이행(O) 상태이거나 점검 전이면 인풋창 비활성화, 미흡(S)/미이행(X)이면 활성화
                const isActionDisabled = (result === 'O' || result === '');

                // 결과 버튼 활성화 상태 클래스
                const btnOClass = result === 'O' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-slate-400 hover:bg-slate-50 border-slate-200';
                const btnSClass = result === 'S' ? 'bg-amber-500 text-white border-amber-500 shadow-sm' : 'bg-white text-slate-400 hover:bg-slate-50 border-slate-200';
                const btnXClass = result === 'X' ? 'bg-red-500 text-white border-red-500 shadow-sm' : 'bg-white text-slate-400 hover:bg-slate-50 border-slate-200';

                // 항목 점검자 귀속 데이터 배지 렌더링
                let historyBadge = '';
                if (result && inspector) {
                    let colorClass = 'text-green-600 bg-green-50';
                    if (result === 'S') colorClass = 'text-amber-600 bg-amber-50';
                    if (result === 'X') colorClass = 'text-red-600 bg-red-50';

                    historyBadge = `
            <div id="badge-${activeCat.id}-${item.no}" class="item-badge inline-flex items-center gap-1 text-[10px] font-semibold ${colorClass} px-2 py-0.5 rounded-full mt-1.5 transition-all">
              <i class="fa-solid fa-user-pen text-[9px]"></i>
              <span>${inspector} (${date} 점검)</span>
            </div>
          `;
                } else {
                    historyBadge = `
            <div id="badge-${activeCat.id}-${item.no}" class="item-badge text-[10px] text-slate-400 mt-1.5 font-medium">
              <i class="fa-solid fa-hourglass"></i> 점검 대기중
            </div>
          `;
                }

                const rowHtml = `
          <tr class="hover:bg-slate-50/70 transition-all">
            <td class="p-3 font-mono text-center text-slate-400 text-xs">${item.no}</td>
            <td class="p-3 text-slate-700 font-medium leading-relaxed">
              
              <div class="group relative inline-block cursor-help w-full">
                <span class="block truncate max-w-full text-slate-800 font-semibold">${
                    item.content.includes('. ') 
                    ? item.content.substring(0, item.content.indexOf('. ') + 1) 
                    : item.content.split('\n')[0]
                }</span>
                <div class="invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all absolute left-0 bottom-full mb-2 w-max max-w-[400px] p-3 bg-slate-800 text-slate-100 text-xs rounded-lg shadow-xl z-50 whitespace-pre-wrap leading-relaxed">${item.content}</div>
              </div>

              ${historyBadge}
            </td>
            <td class="p-3 text-center">
              <div class="inline-flex rounded-lg border border-slate-200 p-0.5 bg-slate-100 gap-1 shadow-inner">
                <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'O')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnOClass}">○ 이행</button>
                <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'S')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnSClass}">△ 미흡</button>
                <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'X')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnXClass}">× 미이행</button>
              </div>
            </td>
            <td class="p-3">
              <input type="text" 
                     id="input-${activeCat.id}-${item.no}"
                     value="${action}" 
                     ${isActionDisabled ? 'disabled' : ''}
                     onblur="setItemAction('${activeCat.id}', '${item.no}', this.value)" 
                     onkeydown="if(event.key === 'Enter'){this.blur();}"
                     placeholder="${isActionDisabled ? '점검 결과 입력 시 활성화' : '미흡 사항 내용 및 조치 계획 입력'}" 
                     class="w-full bg-slate-50 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed hover:bg-white focus:bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs transition-all focus:outline-none focus:ring-1 focus:ring-blue-500">
            </td>
            <td class="p-3 text-center">
              <span class="inline-block bg-slate-100 text-slate-600 font-bold text-[10px] px-2 py-0.5 rounded-full">${item.scope}</span>
            </td>
          </tr>
        `;
                tbody.insertAdjacentHTML('beforeend', rowHtml);
            });

            updateLocalProgressText();
        }

        // 각 카테고리 로컬 통계 텍스트 업데이트
        function updateLocalProgressText() {
            const cats = checklistDatabase[currentSector].categories;
            const activeCat = cats[currentCategoryIndex];
            const total = activeCat.items.length;
            let checked = 0;

            activeCat.items.forEach(it => {
                const state = userProgress[currentPeriod][currentSector][activeCat.id][it.no];
                if (state && state.result) checked++;
            });

            const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
            document.getElementById('catProgressText').innerText = `진행률: ${checked}/${total}문항 (${pct}%)`;
        }

        /**
         * 특정 문항 점검 결과 변경 시 (구글 시트 즉시 자동 전송 연동)
         */
        function setItemResult(catId, itemNo, value) {
            const activeInspector = elInspectorName.value.trim();
            if (!activeInspector) {
                alert('상단의 [점검자명(실명 기재)] 란에 담당자 이름을 먼저 입력해주세요.');
                elInspectorName.focus();
                return;
            }
            const activeDate = elInspectionDate.value || new Date().toISOString().split('T')[0];

            // 토글 선택 해제 로직 (이미 같은 값을 누른 경우 취소)
            const stateObj = userProgress[currentPeriod][currentSector][catId][itemNo];
            const currentState = stateObj.result;
            const currentInspector = stateObj.inspector;

            // 이미 체크된 항목을 다른 사람이 바꿀 때 확인 창 띄우기
            if (currentState && currentInspector && currentInspector !== activeInspector) {
                if (!confirm(`이 항목은 이전에 ${currentInspector}님이 점검하셨습니다.\n정말 점검결과를 바꾸시겠습니까?`)) {
                    return; // 취소 시 함수 종료
                }
            }

            if (currentState === value) {
                stateObj.result = '';
            } else {
                stateObj.result = value;
                stateObj.inspector = activeInspector;
                stateObj.date = activeDate;
            }

            // 이행(O)이거나 미선택일 경우 조치계획 공백 청소
            if (userProgress[currentPeriod][currentSector][catId][itemNo].result === 'O' || userProgress[currentPeriod][currentSector][catId][itemNo].result === '') {
                userProgress[currentPeriod][currentSector][catId][itemNo].action = '';
            }

            loadActiveCategoryItems();
            renderCategoryMenu();
            updateDashboardStats();

            // 서버 자동 백업 기록
            syncSingleItemToServer(catId, itemNo);
            
            // 로컬 브라우저 자동 임시저장 (보험용)
            saveLocalCache();
        }

        /**
         * 조치 내용 입력창 탈출(onblur) 또는 엔터 시 자동 동기화 전송
         */
        function setItemAction(catId, itemNo, value) {
            const activeInspector = elInspectorName.value.trim();
            if (!activeInspector) {
                alert('상단의 [점검자명(실명 기재)] 란에 담당자 이름을 먼저 입력해주세요.');
                elInspectorName.focus();
                return;
            }
            const activeDate = elInspectionDate.value || new Date().toISOString().split('T')[0];

            // 이전값과 동일하면 백그라운드 서버 콜 생략
            if (userProgress[currentPeriod][currentSector][catId][itemNo].action === value) return;

            userProgress[currentPeriod][currentSector][catId][itemNo].action = value;
            userProgress[currentPeriod][currentSector][catId][itemNo].inspector = activeInspector;
            userProgress[currentPeriod][currentSector][catId][itemNo].date = activeDate;

            // 배지만 슬며시 변경
            const badge = document.getElementById(`badge-${catId}-${itemNo}`);
            if (badge) {
                badge.className = "item-badge inline-flex items-center gap-1 text-[10px] font-semibold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full mt-1.5 transition-all";
                badge.innerHTML = `<i class="fa-solid fa-user-pen text-[9px]"></i> <span>${activeInspector} (${activeDate} 점검)</span>`;
            }

            updateDashboardStats();
            syncSingleItemToServer(catId, itemNo);
            
            // 로컬 브라우저 자동 임시저장 (보험용)
            saveLocalCache();
        }

        /**
         * 백그라운드 구글 시트 단일 아이템 실시간 저장
         */
        function syncSingleItemToServer(catId, itemNo) {
            setSyncStatus('saving', '시트에 실시간 기록 중...');

            const cat = checklistDatabase[currentSector].categories.find(c => c.id === catId);
            const item = cat.items.find(i => i.no === itemNo);
            const state = userProgress[currentPeriod][currentSector][catId][itemNo];

            const payload = JSON.stringify({
                period: currentPeriod,
                sector: currentSector,
                catId: catId,
                catTitle: cat.title,
                itemNo: itemNo,
                content: item.content,
                result: state.result,
                action: state.action,
                scope: item.scope,
                inspector: state.inspector,
                date: state.date
            });

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: payload
            })
            .then(res => res.json())
            .then(response => {
                if (response.success) {
                    setSyncStatus('ready', '시트 실시간 연동 완료');
                } else {
                    setSyncStatus('error', '동기화 실패: ' + response.message);
                }
            })
            .catch(err => {
                setSyncStatus('error', '통신 장애: ' + err.toString());
            });
        }

        // 7. 실시간 대시보드 통계 업데이트
        function updateDashboardStats() {
            let totalCount = 0;
            let checkedCount = 0;
            let okCount = 0;
            let warningCount = 0;
            let alertCount = 0;

            ['academic', 'finance'].forEach(sector => {
                checklistDatabase[sector].categories.forEach(cat => {
                    cat.items.forEach(it => {
                        totalCount++;
                        const state = userProgress[currentPeriod][sector][cat.id][it.no];
                        if (state && state.result) {
                            checkedCount++;
                            if (state.result === 'O') okCount++;
                            else if (state.result === 'S') warningCount++;
                            else if (state.result === 'X') alertCount++;
                        }
                    });
                });
            });

            const rate = totalCount > 0 ? Math.round((checkedCount / totalCount) * 100) : 0;
            document.getElementById('progRate').innerText = `${rate}%`;
            document.getElementById('progRatio').innerText = `${checkedCount} / ${totalCount} 문항 완료`;
            document.getElementById('cntOk').innerText = `${okCount}건`;
            document.getElementById('cntWarning').innerText = `${warningCount}건`;
            document.getElementById('cntAlert').innerText = `${alertCount}건`;

            const circle = document.getElementById('progCircle');
            circle.style.clipPath = `polygon(0 0, 100% 0, 100% ${rate}%, 0 ${rate}%)`;

            // 인쇄용 헤더 동기화
            const schoolVal = elSchoolName.value || "하주초등학교";
            document.getElementById('printSchoolName').innerText = `점검기관: ${schoolVal}`;

            buildPrintTable();
        }

        // 8. 필터 및 검색 기능
        function applyFilters() {
            const q = document.getElementById('searchTerm').value.toLowerCase();
            const onlyWarn = document.getElementById('chkOnlyWarning').checked;

            const cats = checklistDatabase[currentSector].categories;
            const activeCat = cats[currentCategoryIndex];

            const tbody = document.getElementById('checklistTableBody');
            tbody.innerHTML = '';

            activeCat.items.forEach(item => {
                const state = userProgress[currentPeriod][currentSector][activeCat.id][item.no];
                const result = state ? state.result : '';
                const action = state ? state.action : '';
                const inspector = state ? state.inspector : '';
                const date = state ? state.date : '';

                const matchesSearch = item.content.toLowerCase().includes(q) || action.toLowerCase().includes(q) || inspector.toLowerCase().includes(q);
                const matchesScope = scope === 'all' || item.scope === scope;
                const matchesWarn = !onlyWarn || (result === 'S' || result === 'X');

                if (matchesSearch && matchesScope && matchesWarn) {
                    const isActionDisabled = (result === 'O' || result === '');
                    const btnOClass = result === 'O' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-slate-400 border-slate-200';
                    const btnSClass = result === 'S' ? 'bg-amber-500 text-white border-amber-500 shadow-sm' : 'bg-white text-slate-400 border-slate-200';
                    const btnXClass = result === 'X' ? 'bg-red-500 text-white border-red-500 shadow-sm' : 'bg-white text-slate-400 border-slate-200';

                    let historyBadge = '';
                    if (result && inspector) {
                        let colorClass = 'text-green-600 bg-green-50';
                        if (result === 'S') colorClass = 'text-amber-600 bg-amber-50';
                        if (result === 'X') colorClass = 'text-red-600 bg-red-50';

                        historyBadge = `
              <div id="badge-${activeCat.id}-${item.no}" class="item-badge inline-flex items-center gap-1 text-[10px] font-semibold ${colorClass} px-2 py-0.5 rounded-full mt-1.5">
                <i class="fa-solid fa-user-pen text-[9px]"></i>
                <span>${inspector} (${date} 점검)</span>
              </div>
            `;
                    } else {
                        historyBadge = `
              <div id="badge-${activeCat.id}-${item.no}" class="item-badge text-[10px] text-slate-400 mt-1.5 font-medium">
                <i class="fa-solid fa-hourglass"></i> 점검 대기중
              </div>
            `;
                    }

                    const rowHtml = `
            <tr class="hover:bg-slate-50 transition-all">
              <td class="p-3 font-mono text-center text-slate-400 text-xs">${item.no}</td>
              <td class="p-3 text-slate-700 font-medium leading-relaxed">
                <div>${item.content}</div>
                ${historyBadge}
              </td>
              <td class="p-3 text-center">
                <div class="inline-flex rounded-lg border border-slate-200 p-0.5 bg-slate-100 gap-1 shadow-inner">
                  <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'O')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnOClass}">○ 이행</button>
                  <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'S')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnSClass}">△ 미흡</button>
                  <button onclick="setItemResult('${activeCat.id}', '${item.no}', 'X')" class="whitespace-nowrap px-2.5 py-1.5 rounded-md text-xs font-bold border transition-all ${btnXClass}">× 미이행</button>
                </div>
              </td>
              <td class="p-3">
                <input type="text" 
                       id="input-${activeCat.id}-${item.no}"
                       value="${action}" 
                       ${isActionDisabled ? 'disabled' : ''}
                       onblur="setItemAction('${activeCat.id}', '${item.no}', this.value)" 
                       onkeydown="if(event.key === 'Enter'){this.blur();}"
                       placeholder="${isActionDisabled ? '점검 결과 입력 시 활성화' : '조치 계획 입력'}" 
                       class="w-full bg-slate-50 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed hover:bg-white focus:bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none">
              </td>
              <td class="p-3 text-center">
                <span class="inline-block bg-slate-100 text-slate-600 font-bold text-[10px] px-2 py-0.5 rounded-full">${item.scope}</span>
              </td>
            </tr>
          `;
                    tbody.insertAdjacentHTML('beforeend', rowHtml);
                }
            });
        }

        // 12. 공문서 스타일용 A4 인쇄 레이아웃 작성 (개인정보 성명/날짜 필터링)
        
        function base64ToUint8Array(base64) {
            var binaryString = window.atob(base64);
            var bytes = new Uint8Array(binaryString.length);
            for (var i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        async function downloadHWPX() {
            if (typeof HWPX_TEMPLATES === 'undefined' || !HWPX_TEMPLATES[currentSector]) {
                alert("내장된 템플릿을 찾을 수 없습니다.");
                return;
            }
            
            document.getElementById('hwpxLoading').style.display = 'inline-block';
            
            try {
                const b64 = HWPX_TEMPLATES[currentSector];
                const uint8 = base64ToUint8Array(b64);
                
                const zip = new JSZip();
                const loadedZip = await zip.loadAsync(uint8);
                const sectionFiles = Object.keys(loadedZip.files).filter(name => name.startsWith("Contents/section") && name.endsWith(".xml"));
                
                if (sectionFiles.length === 0) {
                    alert("HWPX 본문 데이터를 찾을 수 없습니다.");
                    return;
                }
                
                for (const fileName of sectionFiles) {
                    let xmlText = await loadedZip.file(fileName).async("string");
                    
                    if (userProgress[currentPeriod] && userProgress[currentPeriod][currentSector]) {
                        const sectorData = userProgress[currentPeriod][currentSector];
                        Object.keys(sectorData).forEach(catId => {
                            const catObj = sectorData[catId];
                            Object.keys(catObj).forEach(itemNo => {
                                const state = catObj[itemNo];
                                
                                let resSymbol = " ";
                                if (state.result === 'O') resSymbol = "○";
                                else if (state.result === 'S') resSymbol = "△";
                                else if (state.result === 'X') resSymbol = "×";
                                else if (state.result === 'N') resSymbol = "-";
                                
                                const actionText = state.action ? state.action : " ";
                                
                                const resTag = `[[${catId}_${itemNo}_R]]`;
                                const actTag = `[[${catId}_${itemNo}_A]]`;
                                
                                const escapeXml = (unsafe) => {
                                    return unsafe.replace(/[<>&'"]/g, function (c) {
                                        switch (c) {
                                            case '<': return '&lt;';
                                            case '>': return '&gt;';
                                            case '&': return '&amp;';
                                            case "\'": return '&apos;';
                                            case '"': return '&quot;';
                                        }
                                    });
                                };
                                
                                xmlText = xmlText.split(resTag).join(escapeXml(resSymbol));
                                xmlText = xmlText.split(actTag).join(escapeXml(actionText));
                            });
                        });
                    }
                    
                    loadedZip.file(fileName, xmlText);
                }
                
                const blob = await loadedZip.generateAsync({type: "blob"});
                const sectorName = currentSector === 'academic' ? '학사분야' : '회계분야';
                saveAs(blob, `완성본_자가진단표(${sectorName}).hwpx`);
                alert("HWPX 자동 다운로드가 완료되었습니다!");
            } catch (e) {
                console.error(e);
                alert("HWPX 처리 중 오류가 발생했습니다: " + e.message);
            } finally {
                document.getElementById('hwpxLoading').style.display = 'none';
            }
        }        function buildPrintTable() {
            const container = document.getElementById('printTableContainer');
            container.innerHTML = '';

            const cats = checklistDatabase[currentSector].categories;
            const sectorTitle = checklistDatabase[currentSector].title;

            let fullHtml = `<div style="font-family: 'Batang', '바탕', 'Malgun Gothic', '맑은 고딕', serif; color: #000;">`;

            fullHtml += `
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 22pt; font-weight: bold; margin: 0; padding-bottom: 10px; border-bottom: 2px solid #000; display: inline-block;">
                    ${sectorTitle}
                </h1>
            </div>
            `;

            let currentMajorPrefix = "";

            cats.forEach((cat, cIdx) => {
                const prefix = cat.id.split('-')[0];
                const majorTitle = getMajorTitle(currentSector, prefix);
                const isFirstOfMajor = cIdx === 0 || cats[cIdx-1].id.split('-')[0] !== prefix;
                
                if (isFirstOfMajor) {
                    // 이전 대분류 테이블이 열려있다면 닫기
                    if (cIdx > 0) {
                        fullHtml += `</tbody></table>`;
                    }

                    currentMajorPrefix = prefix;
                    
                    // 대분류 시작 (페이지 넘김 처리)
                    fullHtml += `
                    <div style="margin-top: 30px; margin-bottom: 15px; font-size: 16pt; font-weight: bold; ${cIdx > 0 ? 'page-break-before: always;' : ''}">
                        ${prefix}. ${majorTitle}
                    </div>`;

                    // 새 대분류의 단일 통합 테이블 시작
                    fullHtml += `
                    <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; border-top: 2px solid #000; border-bottom: 2px solid #000; font-size: 11pt; table-layout: fixed; margin-bottom: 30px;">
                        <thead>
                            <tr>
                                <th style="width: 6%; border: 1px solid #000; background-color: #f2f2f2; padding: 10px; text-align: center;">연번</th>
                                <th style="width: 44%; border: 1px solid #000; background-color: #f2f2f2; padding: 10px; text-align: center;">점 검 내 용</th>
                                <th style="width: 15%; border: 1px solid #000; background-color: #f2f2f2; padding: 10px; text-align: center;">점검결과<br><span style="font-size:9pt; font-weight:normal;">(○,△,×,-)</span></th>
                                <th style="width: 25%; border: 1px solid #000; background-color: #f2f2f2; padding: 10px; text-align: center;">조치계획 및 미흡내용</th>
                                <th style="width: 10%; border: 1px solid #000; background-color: #f2f2f2; padding: 10px; text-align: center;">해당대상</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;
                }

                // 중분류 제목 (테이블 내 병합된 행으로 삽입)
                fullHtml += `
                    <tr style="page-break-inside: avoid;">
                        <td colspan="5" style="border: 1px solid #000; background-color: #fcfcfc; padding: 10px; font-weight: bold; font-size: 12pt;">
                            ${cat.id} ${cat.title}
                        </td>
                    </tr>
                `;

                cat.items.forEach((it, idx) => {
                    const state = userProgress[currentPeriod][currentSector][cat.id][it.no];
                    let resSymbol = "";
                    if (state && state.result === 'O') resSymbol = "○";
                    else if (state && state.result === 'S') resSymbol = "△";
                    else if (state && state.result === 'X') resSymbol = "×";
                    else if (state && state.result === 'N') resSymbol = "-";

                    const actText = (state && state.action) ? state.action : "";

                    fullHtml += `
                        <tr style="page-break-inside: avoid;">
                            <td style="border: 1px solid #000; padding: 8px; text-align: center;">${idx + 1}</td>
                            <td style="border: 1px solid #000; padding: 8px 10px; line-height: 1.5; text-align: left;">${it.content}</td>
                            <td style="border: 1px solid #000; padding: 8px; text-align: center; font-weight: bold; font-size: 13pt;">${resSymbol}</td>
                            <td style="border: 1px solid #000; padding: 8px; font-size: 10pt; text-align: left;">${actText}</td>
                            <td style="border: 1px solid #000; padding: 8px; text-align: center; font-size: 10pt;">${it.scope}</td>
                        </tr>
                    `;
                });
            });

            // 마지막 테이블 닫기
            if (cats.length > 0) {
                fullHtml += `</tbody></table>`;
            }

            fullHtml += "</div>";
            container.innerHTML = fullHtml;
        }
    </script>
